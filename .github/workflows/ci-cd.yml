name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hefai_test
          POSTGRES_USER: hefai
          POSTGRES_PASSWORD: hefai_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hefai -d hefai_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://hefai:hefai_password@localhost:5432/hefai_test?schema=public
      JWT_SECRET: ci-secret
      VITE_API_URL: http://localhost:4000/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
