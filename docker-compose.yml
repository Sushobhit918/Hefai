services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hefai
      POSTGRES_USER: hefai
      POSTGRES_PASSWORD: hefai_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hefai -d hefai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://hefai:hefai_password@db:5432/hefai?schema=public
      JWT_SECRET: change-me-in-production
      PORT: 4000
      WEB_ORIGIN: http://localhost:8081
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"
    command: sh -c "npx prisma migrate deploy && node dist/server.js"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: http://localhost:4000/api
    depends_on:
      - api
    ports:
      - "8081:80"

volumes:
  postgres_data:
  redis_data:
