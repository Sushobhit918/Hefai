services:
  - type: keyvalue
    name: hefai-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  - type: web
    name: hefai-api
    runtime: node
    plan: free
    buildCommand: npm ci && npm run prisma:generate && npm --workspace apps/api run build
    startCommand: npx prisma migrate deploy --schema apps/api/prisma/schema.prisma && node apps/api/dist/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: hefai-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: hefai-redis
          property: connectionString
      - key: WEB_ORIGIN
        sync: false
      - key: ALLOW_VERCEL_ORIGINS
        value: "true"

databases:
  - name: hefai-postgres
    databaseName: hefai
    user: hefai
    plan: free
    ipAllowList: []
