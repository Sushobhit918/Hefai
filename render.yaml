services:
  - type: web
    name: hefai-api
    runtime: node
    plan: free
    buildCommand: npm ci && npm run prisma:generate && npm --workspace apps/api run build
    startCommand: npx prisma migrate deploy --schema apps/api/prisma/schema.prisma && node apps/api/dist/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: WEB_ORIGIN
        sync: false
      - key: ALLOW_VERCEL_ORIGINS
        value: "true"
